# =============================================================================
# SWE benchmark runner config
# =============================================================================
#
# Supplies the run-time parameters for the headless harness
# (scripts/run-swe-headless.py). The harness loads this file, then drives
# `claude -p /swe ...` once per dataset task, capturing token/latency/turn
# metrics from each run's JSON result.
#
# Every field below can be overridden on the command line; CLI flags always
# win over the file. Copy this file, edit it for your endpoint, and pass it
# with --config.
#
# `model` and `dataset` are deliberately left unset here: they are the only two
# things that change from run to run, so pass them on the command line instead
# of maintaining a separate config file per model or dataset:
#
#   uv run scripts/run-swe-headless.py --config config/runner.yaml \
#       --model qwen3-coder-30b --dataset dataset/mcp-gateway-registry.yaml
#
# You may still pin them in this file if you prefer; the CLI value wins either
# way. If neither the file nor the CLI supplies them, the run fails fast.
#
# -----------------------------------------------------------------------------
# Fields
# -----------------------------------------------------------------------------
#   provider          str   How claude -p reaches the model:
#                             endpoint (default) - route through a base URL
#                               (a local vLLM server, a gateway, or the
#                               Anthropic API). Uses `endpoint` and `api_key`.
#                             bedrock - drive models directly on Amazon Bedrock
#                               (CLAUDE_CODE_USE_BEDROCK=1). Uses `aws_region`
#                               and ambient AWS credentials; `endpoint`/`api_key`
#                               are ignored, and the vLLM Prometheus block is
#                               left unavailable (Bedrock exposes no /metrics).
#   endpoint          str   Base URL of the OpenAI/Anthropic-compatible endpoint
#                           the model is served on (e.g. a local vLLM server).
#                           Required for provider=endpoint.
#   model             str   Model name/id passed to `claude --model` and used as
#                           the {model-name} artifact subfolder. For
#                           provider=bedrock this is a Bedrock model id or
#                           inference profile (e.g. us.anthropic.claude-opus-4-8).
#                           Usually supplied with --model rather than pinned here.
#   api_key           str   API key sent to the endpoint (provider=endpoint only).
#                           Local servers ignore the value; keep a placeholder
#                           like "local".
#   aws_region        str   AWS region for provider=bedrock (e.g. us-east-1).
#                           Falls back to AWS_REGION / AWS_DEFAULT_REGION when
#                           unset.
#   dataset           str   Path to the benchmark dataset YAML file. Usually
#                           supplied with --dataset rather than pinned here.
#   output_dir        str   Directory (relative to the repo root) where the /swe
#                           skill writes artifacts.
#   clone_dir         str   Parent directory for per-task temporary repo clones.
#                           Each task clones into a fresh mkdtemp subdirectory.
#   tasks             list  Task ids to run. Omit or leave empty to run them all.
#   concurrency       int   How many tasks to run at once. 1 (default) runs them
#                           serially. Values above 1 overlap runs on the endpoint,
#                           which turns the per-run vllm_prometheus metrics into a
#                           server-wide aggregate (see the README); the per-run API
#                           metrics stay correct.
#   permission_mode   str   claude -p permission mode: default | acceptEdits |
#                           plan. bypassPermissions is intentionally NOT allowed.
#   allowed_tools     list  Tools claude -p may use without prompting. Kept
#                           narrow: read the repo, write the four artifacts.
#   max_turns         int   Cap on the agent loop (claude --max-turns).
#   max_output_tokens int   Per-response output-token cap for the model.
#   context_window    int   The model's true context window, in tokens. Claude
#                           Code cannot detect the window of a custom model on a
#                           custom base URL, so without this it never triggers
#                           auto-compaction and the conversation grows until the
#                           endpoint rejects the request (500 "maximum context
#                           length is N tokens"), which the client then retries
#                           forever. Set this to the served window (for vLLM, the
#                           MAX_MODEL_LEN you booted with) to calibrate
#                           auto-compaction (CLAUDE_CODE_AUTO_COMPACT_WINDOW).
#                           0 (default) leaves it unset -- correct for known
#                           Claude models / Bedrock, whose window is built in.
#                           The orchestrator (run-e2e-benchmark.sh) passes the
#                           live vLLM window automatically on the vllm path.
#   auto_compact_fraction float  Fraction of context_window at which to compact
#                           (default 0.9), leaving headroom above the output
#                           reserve. Only applies when context_window > 0.
#   timeout_seconds   int   Wall-clock timeout for a single task's claude -p run.
#   settings_file     str   Optional claude --settings JSON (e.g. the vLLM
#                           config that pins ANTHROPIC_BASE_URL). Optional.
# =============================================================================

# Routing provider: "endpoint" (a base URL, the default) or "bedrock" (native
# Amazon Bedrock). Usually left at the default and switched per run with
# --provider bedrock when you want to benchmark a model straight off Bedrock.
provider: endpoint

# provider=endpoint routing. Ignored when provider=bedrock.
endpoint: http://127.0.0.1:8000
api_key: local

# provider=bedrock routing. Uncomment (or pass --aws-region / export AWS_REGION)
# when running against Amazon Bedrock. Requires ambient AWS credentials.
# aws_region: us-east-1

# model and dataset are supplied on the CLI (--model / --dataset) so this one
# file serves every model and dataset. Uncomment to pin a default instead:
# model: qwen3-coder-30b
# dataset: dataset/mcp-gateway-registry.yaml
#
# For Amazon Bedrock, model is a Bedrock model id or inference profile, e.g.:
#   uv run scripts/run-swe-headless.py --config config/runner.yaml \
#       --provider bedrock --aws-region us-east-1  \
#       --model us.anthropic.claude-opus-4-8 \
#       --dataset dataset/mcp-gateway-registry.yaml

output_dir: swe-benchmark-data
clone_dir: /tmp

# Run every task in the dataset. To run a subset, list task ids, e.g.:
# tasks:
#   - remove-faiss
#   - ssrf-hardening-outbound-url-validation
tasks: []

# Run tasks serially (1) by default. Raise to run several at once, e.g. 3. Note
# that concurrency > 1 makes the vllm_prometheus block a server-wide aggregate
# over the overlapping window; per-run API metrics (tokens, latency, turns) are
# unaffected. Use 1 when you need per-run vLLM cache metrics.
concurrency: 1

permission_mode: acceptEdits
allowed_tools:
  - Read
  - Glob
  - Grep
  - Write
  - Edit
  # Git and read-only shell for exploring the cloned repo. Claude models use
  # `git -C <dir>`; other models (e.g. Kimi) emit `cd <dir> && git ...` or plain
  # ls/cat/find, so we allow those forms too -- applied to every model equally
  # so the benchmark environment stays identical. Kept read-only: no mutation
  # of the target repo beyond the four artifacts written via Write/Edit.
  - Bash(git*)
  - Bash(cd*)
  - Bash(ls*)
  - Bash(cat*)
  - Bash(find*)
  - Bash(head*)
  - Bash(tail*)
  - Bash(wc*)
  - Bash(mktemp*)
  - Task
max_turns: 60
max_output_tokens: 16000

# Model context window, in tokens, used to calibrate Claude Code's
# auto-compaction for custom models it cannot introspect. 0 = leave unset (right
# for known Claude models / Bedrock). On the vllm path the orchestrator passes
# the live server's MAX_MODEL_LEN via --context-window, which overrides this.
context_window: 0
auto_compact_fraction: 0.9

timeout_seconds: 1800

# Point claude -p at the local vLLM server's Claude Code settings. Relative to
# the repo root. Uncomment to use it; leave commented to rely on the
# endpoint/api_key fields above.
# settings_file: self-hosted/vllm/config/claude-code.json
